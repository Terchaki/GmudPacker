<div class="transform-container">
  <div class="transform-section">
    <h2>Transformador de Arquivos GMUD</h2>

    <div class="input-area">
      <label for="input-textarea">Cole o conteúdo do arquivo do pipeline:</label>
      <textarea id="input-textarea" [value]="inputText()" (input)="handleInputChange($event)"
        placeholder="Cole o log do pipeline com os arquivos minificados aqui..." [disabled]="isLoading()"></textarea>
      @if(totalLength() > 0) {
      <p class="total-length">{{ totalLength() }}</p>
      }
    </div>

    <div class="action-buttons">
      <button class="btn btn-primary" (click)="handleGenerate()" [disabled]="isLoading() || !inputText().trim()">
        {{ isLoading() ? 'Processando...' : 'Gerar' }}
      </button>
      <button class="btn btn-secondary" (click)="handleClear()" [disabled]="isLoading()">
        Limpar
      </button>
    </div>

    <!-- Progress Bar -->
    <div *ngIf="isLoading()" class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="progress()"></div>
      </div>
      <p class="progress-text">{{ roundedProgress() }}%</p>
    </div>

    <!-- Mensagem de erro -->
    <div *ngIf="errorMessage()" class="error-message">
      <span class="error-icon">⚠</span>
      {{ errorMessage() }}
    </div>

    <!-- Result Area -->
    <div *ngIf="showResult()" class="result-area">
      <div class="result-header">
        <h3>Resultado Processado <span class="file-count">({{ fileCount() + 1 }} arquivo{{ fileCount() + 1 > 1 ? 's' :
            '' }})</span></h3>
        <div class="result-actions">
          <button class="btn btn-copy" (click)="handleCopy()" [class.copied]="copySuccess()">
            {{ copySuccess() ? '✓ Copiado!' : 'Copiar' }}
          </button>
          <button class="btn btn-download" (click)="handleDownloadTxt()">
            Baixar .txt
          </button>
        </div>
      </div>

      <!-- Exibição com linhas numeradas -->
      <div class="result-display">
        <div class="line-item" *ngFor="let line of resultLines(); let i = index">
          <span class="line-number">{{ i + 1 }}</span>
          <span class="line-content">{{ line }}</span>
        </div>
      </div>

      <!-- Textarea invisível para copiar -->
      <textarea class="result-textarea-hidden" [value]="resultText()" readonly></textarea>
    </div>
  </div>
</div>
